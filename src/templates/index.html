<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Assistant — Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
    }

    .card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #1d3557;
    }

    .card p.subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #1e40af; }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>HR Assistant</h1>
    <p class="subtitle">Please tell us a bit about yourself before we begin.</p>

    <form method="POST" action="/submit" autocomplete="on">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required
               placeholder="Jane Doe" autocomplete="name" />
      </div>

      <div class="field">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" required
               placeholder="jane@company.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="" disabled selected>Select your department</option>
          <option>Engineering</option>
          <option>Finance</option>
          <option>Human Resources</option>
          <option>Legal</option>
          <option>Marketing</option>
          <option>Operations</option>
          <option>Product</option>
          <option>Sales</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label for="position">Position / Job Title</label>
        <input type="text" id="position" name="position" required
               placeholder="Software Engineer" autocomplete="organization-title" />
      </div>

      <button type="submit">Start Chat &rarr;</button>
    </form>

    <p class="footer">Your information is used only within this session.</p>
  </div>
</body>
</html>
